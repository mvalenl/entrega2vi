<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Por qué todo está más caro? La brecha entre el IPC y tu mesa</title>
    <meta name="description" content="Visualización interactiva y sonificación del impacto de la inflación en productos básicos durante 2024-2025.">
    
    <!-- CSS -->
    <link rel="stylesheet" href="index.css">
    
    <!-- Bibliotecas de terceros -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

    <div class="dashboard-container">
        <!-- Encabezado -->
        <header class="header">
            <h1>¿Por qué todo está más caro?</h1>
            <p>La brecha entre el IPC general y el costo real de los productos básicos en tu mesa.</p>
        </header>

        <!-- Panel Principal -->
        <main class="glass-panel">
            
            <!-- Contenedor del Gráfico -->
            <div id="plotly-chart" style="width: 100%; height: 500px;"></div>
            
            <!-- Controles Interactivos -->
            <div class="controls" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-top: 2rem;">
                <button id="play-aceite" class="play-btn" style="background: var(--accent-aceite);">
                    Escuchar Aceite (Crisis)
                </button>
                <button id="play-pan" class="play-btn" style="background: var(--accent-pan); color: #000;">
                    Escuchar Pan (Estabilidad)
                </button>
                <button id="play-arroz" class="play-btn" style="background: var(--accent-arroz);">
                    Escuchar Arroz (Moderado)
                </button>
                <button id="play-ipc" class="play-btn" style="background: #475569;">
                    Escuchar IPC (Referencia)
                </button>
            </div>

            <!-- Texto de Estado de Tone.js -->
            <div id="status-text" class="status">Haz clic en el botón para escuchar cómo evolucionó el precio.</div>

        </main>
    </div>

    <!-- Cargar los datos extraídos -->
    <script src="datos_extraidos.js"></script>
    
    <!-- Lógica de la aplicación -->
    <script src="app.js"></script>
</body>
</html>
